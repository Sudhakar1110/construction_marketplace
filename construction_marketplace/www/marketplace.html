<!-- Construction Marketplace - Marketplace Page -->
{% extends "templates/web.html" %}

{% block style %}
<style>
.marketplace-header {
    background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
    padding: 50px 0 30px;
    color: #fff;
}
.filter-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.06); margin-bottom: 20px; }
.filter-card h6 { font-weight: 700; color: #333; margin-bottom: 12px; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; }
.filter-card .form-check { margin-bottom: 8px; }
.filter-card .form-check-label { font-size: 0.9rem; color: #555; cursor: pointer; }
.price-range .form-control { border-radius: 8px; font-size: 0.85rem; }
.price-range .form-control:focus { box-shadow: none; border-color: #1a237e; }
.product-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 15px rgba(0,0,0,0.06); transition: all 0.3s ease; height: 100%; }
.product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
.product-card .product-image { height: 180px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.product-card .product-image img { max-width: 100%; max-height: 100%; object-fit: contain; }
.product-card .product-body { padding: 15px; }
.product-card .product-category { font-size: 0.75rem; color: #ff6f00; font-weight: 600; text-transform: uppercase; }
.product-card .product-name { font-size: 0.95rem; font-weight: 700; color: #333; margin: 5px 0; }
.product-card .product-brand { font-size: 0.8rem; color: #888; }
.product-card .product-price { font-size: 1.1rem; font-weight: 800; color: #1a237e; margin: 8px 0; }
.product-card .product-footer { padding: 10px 15px; background: #fafafa; border-top: 1px solid #eee; }
.rating-stars { color: #ffa000; font-size: 0.85rem; }
.pagination .page-link { border-radius: 8px; margin: 0 3px; color: #1a237e; border: 1px solid #e0e0e0; padding: 8px 16px; }
.pagination .page-item.active .page-link { background: #1a237e; border-color: #1a237e; color: #fff; }
</style>
{% endblock %}

{% block page_content %}
<section class="marketplace-header">
    <div class="container">
        <h1 class="fw-bold mb-2">Materials Marketplace</h1>
        <p class="mb-0 opacity-75">Browse and compare construction materials from verified suppliers</p>
    </div>
</section>

<section class="py-4">
    <div class="container">
        <div class="row">
            <!-- Filters Sidebar -->
            <div class="col-lg-3">
                <div class="filter-card">
                    <h6><i class="fas fa-search me-2"></i>Search</h6>
                    <input type="text" class="form-control" id="search-query" placeholder="Search materials..." style="border-radius:8px;">
                </div>

                <div class="filter-card">
                    <h6><i class="fas fa-tags me-2"></i>Categories</h6>
                    <div id="category-filters">
                        <div class="text-center py-2">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                        </div>
                    </div>
                </div>

                <div class="filter-card">
                    <h6><i class="fas fa-rupee-sign me-2"></i>Price Range</h6>
                    <div class="row g-2 price-range">
                        <div class="col-6">
                            <input type="number" class="form-control" id="min-price" placeholder="Min" min="0">
                        </div>
                        <div class="col-6">
                            <input type="number" class="form-control" id="max-price" placeholder="Max" min="0">
                        </div>
                    </div>
                </div>

                <div class="filter-card">
                    <h6><i class="fas fa-building me-2"></i>Suppliers</h6>
                    <div id="supplier-filters">
                        <div class="text-center py-2">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary w-100 mb-2" id="apply-filters"><i class="fas fa-filter me-2"></i>Apply Filters</button>
                <button class="btn btn-outline-secondary w-100" id="clear-filters"><i class="fas fa-undo me-2"></i>Clear All</button>
            </div>

            <!-- Results -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <span class="fw-bold" id="result-count">Loading...</span>
                    </div>
                    <select class="form-select form-select-sm w-auto" id="sort-by">
                        <option value="name">Name</option>
                        <option value="price_low">Price: Low to High</option>
                        <option value="price_high">Price: High to Low</option>
                    </select>
                </div>

                <div class="row g-3" id="materials-grid">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>

                <nav class="mt-4" id="pagination-container">
                    <ul class="pagination justify-content-center" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block script %}
<script>
var currentPage = 1;
var totalPages = 1;

$(document).ready(function() {
    loadFilters();
    loadMaterials();

    $('#apply-filters').click(function() { currentPage = 1; loadMaterials(); });
    $('#clear-filters').click(function() {
        $('#search-query').val('');
        $('#min-price').val('');
        $('#max-price').val('');
        $('.category-filter').prop('checked', false);
        $('.supplier-filter').prop('checked', false);
        currentPage = 1;
        loadMaterials();
    });
    $('#search-query').on('keyup', function(e) { if(e.keyCode === 13) { currentPage = 1; loadMaterials(); } });
    $('#sort-by').change(function() { loadMaterials(); });
});

function loadFilters() {
    // Load categories
    frappe.call({
        method: "construction_marketplace.api.get_categories",
        callback: function(r) {
            if(r.message) {
                var html = '';
                r.message.forEach(function(c) {
                    html += '<div class="form-check">';
                    html += '<input class="form-check-input category-filter" type="checkbox" value="' + c.title + '" id="cat-' + c.name + '">';
                    html += '<label class="form-check-label" for="cat-' + c.name + '">' + c.title + ' (' + (c.material_count || 0) + ')</label>';
                    html += '</div>';
                });
                $('#category-filters').html(html);
            }
        }
    });

    // Load suppliers
    frappe.call({
        method: "construction_marketplace.api.get_suppliers",
        callback: function(r) {
            if(r.message) {
                var html = '';
                r.message.forEach(function(s) {
                    html += '<div class="form-check">';
                    html += '<input class="form-check-input supplier-filter" type="checkbox" value="' + s.supplier_id + '" id="supp-' + s.supplier_id + '">';
                    html += '<label class="form-check-label" for="supp-' + s.supplier_id + '">' + s.supplier_name;
                    if(s.rating) html += ' <span class="rating-stars"><i class="fas fa-star" style="font-size:0.7rem;"></i> ' + s.rating + '</span>';
                    html += '</label></div>';
                });
                $('#supplier-filters').html(html);
            }
        }
    });
}

function loadMaterials() {
    var query = $('#search-query').val();
    var categories = [];
    var suppliers = [];
    
    $('.category-filter:checked').each(function() { categories.push($(this).val()); });
    $('.supplier-filter:checked').each(function() { suppliers.push($(this).val()); });
    
    // Get URL params
    var urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('query')) query = query || urlParams.get('query');
    if(urlParams.get('category')) categories.push(urlParams.get('category'));
    if(urlParams.get('supplier')) suppliers.push(urlParams.get('supplier'));
    
    $('#materials-grid').html('<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>');
    
    frappe.call({
        method: "construction_marketplace.api.search_materials",
        args: {
            query: query,
            category: categories.length === 1 ? categories[0] : null,
            min_price: $('#min-price').val() || null,
            max_price: $('#max-price').val() || null,
            supplier: suppliers.length > 0 ? suppliers[0] : null,
            page: currentPage,
            page_size: 12
        },
        callback: function(r) {
            if(r.message) {
                renderMaterials(r.message);
            }
        }
    });
}

function renderMaterials(data) {
    var materials = data.materials || [];
    var total = data.total || 0;
    totalPages = data.total_pages || 1;
    
    $('#result-count').text(total + ' materials found');
    
    if(materials.length === 0) {
        $('#materials-grid').html('<div class="col-12 text-center py-5"><i class="fas fa-search" style="font-size:3rem;color:#ccc;"></i><h5 class="mt-3 text-muted">No materials found</h5><p>Try adjusting your filters or search terms.</p></div>');
        $('#pagination').empty();
        return;
    }
    
    var html = '';
    materials.forEach(function(m) {
        html += '<div class="col-md-4 col-6">';
        html += '<div class="product-card">';
        html += '<div class="product-image">';
        if(m.image) html += '<img src="' + m.image + '" alt="' + m.material_name + '">';
        else html += '<i class="fas fa-cubes" style="font-size:3rem;color:#ddd;"></i>';
        html += '</div>';
        html += '<div class="product-body">';
        html += '<div class="product-category">' + (m.category || '') + '</div>';
        html += '<div class="product-name">' + m.material_name + '</div>';
        if(m.brand) html += '<div class="product-brand">' + m.brand + '</div>';
        if(m.min_price) {
            html += '<div class="product-price">₹ ' + formatCurrency(m.min_price) + '/' + (m.unit_of_measure || '') + '</div>';
        }
        if(m.supplier_count) {
            html += '<div class="small text-muted"><i class="fas fa-store me-1"></i>' + m.supplier_count + ' suppliers</div>';
        }
        html += '</div>';
        html += '<div class="product-footer">';
        var detailUrl = m.route ? '/material-view?name=' + m.route : '/material-view?name=' + encodeURIComponent(m.material_id);
        html += '<a href="' + detailUrl + '" class="btn btn-sm btn-outline-primary rounded-pill"><i class="fas fa-eye me-1"></i> Details</a>';
        html += '</div></div></div>';
    });
    
    $('#materials-grid').html(html);
    renderPagination();
}

function renderPagination() {
    var html = '';
    if(currentPage > 1) {
        html += '<li class="page-item"><a class="page-link" href="#" data-page="' + (currentPage-1) + '">«</a></li>';
    }
    for(var i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
        html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '"><a class="page-link" href="#" data-page="' + i + '">' + i + '</a></li>';
    }
    if(currentPage < totalPages) {
        html += '<li class="page-item"><a class="page-link" href="#" data-page="' + (currentPage+1) + '">»</a></li>';
    }
    $('#pagination').html(html);
    
    $('.page-link').click(function(e) {
        e.preventDefault();
        currentPage = parseInt($(this).data('page'));
        loadMaterials();
        window.scrollTo({top: 0, behavior: 'smooth'});
    });
}

function formatCurrency(amount) {
    return Number(amount).toLocaleString('en-IN');
}
</script>
{% endblock %}
