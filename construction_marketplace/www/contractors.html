<!-- Construction Marketplace - Contractor Directory -->
{% extends "templates/web.html" %}

{% block style %}
<style>
.provider-header { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); padding: 40px 0; color: #fff; }
.contractor-card { background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.06); transition: all 0.3s ease; height: 100%; }
.contractor-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
.contractor-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #1a237e, #3949ab); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; }
.contractor-name { font-size: 1.1rem; font-weight: 700; color: #333; }
.contractor-company { font-size: 0.85rem; color: #888; }
.contractor-info { font-size: 0.85rem; color: #666; }
.contractor-info i { width: 18px; color: #1a237e; }
.verified-badge { background: #e8f5e9; color: #2e7d32; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
</style>
{% endblock %}

{% block page_content %}
<section class="provider-header">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb bg-transparent p-0 mb-2"><li class="breadcrumb-item"><a href="/" class="text-white-50">Home</a></li><li class="breadcrumb-item active text-white">Contractors</li></ol></nav>
        <h1 class="fw-bold mb-2">Contractor Directory</h1>
        <p class="mb-0 opacity-75">Find experienced and verified contractors for your construction projects</p>
    </div>
</section>

<section class="py-4">
    <div class="container">
        <div class="row mb-3">
            <div class="col-md-8 mb-2 mb-md-0">
                <div class="input-group">
                    <input type="text" class="form-control" id="search-location" placeholder="Search by city or location...">
                    <button class="btn btn-primary" id="search-btn"><i class="fas fa-search me-1"></i> Search</button>
                </div>
            </div>
        </div>
        <div class="row g-3" id="contractors-grid">
            <div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
        <nav class="mt-4"><ul class="pagination justify-content-center" id="pagination"></ul></nav>
    </div>
</section>
{% endblock %}

{% block script %}
<script>
var currentPage = 1, totalPages = 1;
$(document).ready(function() {
    loadContractors();
    $('#search-btn').click(function() { currentPage = 1; loadContractors(); });
    $('#search-location').keyup(function(e) { if(e.keyCode === 13) { currentPage = 1; loadContractors(); } });
});

function loadContractors() {
    var location = $('#search-location').val();
    $('#contractors-grid').html('<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>');
    
    frappe.call({
        method: "construction_marketplace.api.get_contractors",
        args: { location: location || null, page: currentPage },
        callback: function(r) {
            if(r.message) renderContractors(r.message);
        }
    });
}

function renderContractors(data) {
    var contractors = data.contractors || [];
    totalPages = data.total_pages || 1;
    
    if(contractors.length === 0) {
        $('#contractors-grid').html('<div class="col-12 text-center py-5"><i class="fas fa-hard-hat" style="font-size:3rem;color:#ddd;"></i><h5 class="mt-3 text-muted">No contractors found</h5><p class="text-muted">Check back later as new contractors join.</p></div>');
        $('#pagination').empty(); return;
    }
    
    var html = '';
    contractors.forEach(function(c) {
        var initials = (c.customer_name || '').split(' ').map(w => w[0]).join('').slice(0,2);
        html += '<div class="col-md-6 col-lg-4"><div class="contractor-card">';
        html += '<div class="d-flex align-items-center gap-3 mb-3">';
        html += '<div class="contractor-avatar">' + initials + '</div>';
        html += '<div><div class="contractor-name">' + c.customer_name + '</div>';
        if(c.company_name) html += '<div class="contractor-company">' + c.company_name + '</div>';
        if(c.is_verified) html += '<span class="verified-badge mt-1 d-inline-block"><i class="fas fa-check-circle me-1"></i>Verified</span>';
        html += '</div></div>';
        html += '<div class="contractor-info mb-2"><i class="fas fa-map-marker-alt me-1"></i> ' + (c.city || '') + (c.state ? ', ' + c.state : '') + '</div>';
        if(c.contact_person) html += '<div class="contractor-info mb-2"><i class="fas fa-user me-1"></i> ' + c.contact_person + '</div>';
        if(c.phone || c.mobile) html += '<div class="contractor-info mb-2"><i class="fas fa-phone me-1"></i> ' + (c.phone || c.mobile) + '</div>';
        if(c.email) html += '<div class="contractor-info mb-3"><i class="fas fa-envelope me-1"></i> ' + c.email + '</div>';
        if(c.profile_description) html += '<p class="small text-muted mt-2 mb-0">' + c.profile_description.slice(0, 150) + '</p>';
        html += '<div class="mt-3"><button class="btn btn-outline-primary btn-sm rounded-pill contact-btn" data-name="' + c.customer_name + '" data-email="' + (c.email || '') + '"><i class="fas fa-envelope me-1"></i> Contact</button></div>';
        html += '</div></div>';
    });
    
    $('#contractors-grid').html(html);
    renderPagination();
    
    $('.contact-btn').click(function() { window.location.href = '/request-quote?contractor=' + encodeURIComponent($(this).data('name')); });
}

function renderPagination() {
    var html = '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '"><a class="page-link" href="#" data-page="' + (currentPage-1) + '">«</a></li>';
    for(var i = Math.max(1, currentPage-3); i <= Math.min(totalPages, currentPage+3); i++) {
        html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '"><a class="page-link" href="#" data-page="' + i + '">' + i + '</a></li>';
    }
    html += '<li class="page-item ' + (currentPage >= totalPages ? 'disabled' : '') + '"><a class="page-link" href="#" data-page="' + (currentPage+1) + '">»</a></li>';
    $('#pagination').html(html);
    $('.page-link').click(function(e) { e.preventDefault(); if($(this).parent().hasClass('disabled')) return; currentPage = parseInt($(this).data('page')); loadContractors(); window.scrollTo({top:0,behavior:'smooth'}); });
}
</script>
{% endblock %}
