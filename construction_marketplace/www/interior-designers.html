<!-- Construction Marketplace - Interior Designer Directory -->
{% extends "templates/web.html" %}

{% block style %}
<style>
.provider-header { background: linear-gradient(135deg, #6a1b9a 0%, #ab47bc 100%); padding: 40px 0; color: #fff; }
.designer-card { background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 2px 15px rgba(0,0,0,0.06); transition: all 0.3s ease; height: 100%; }
.designer-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
.designer-avatar { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, #6a1b9a, #ab47bc); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; }
.portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 12px; }
.portfolio-item { height: 60px; background: #f0f0f0; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #999; }
</style>
{% endblock %}

{% block page_content %}
<section class="provider-header">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb bg-transparent p-0 mb-2"><li class="breadcrumb-item"><a href="/" class="text-white-50">Home</a></li><li class="breadcrumb-item active text-white">Interior Designers</li></ol></nav>
        <h1 class="fw-bold mb-2">Interior Designer Directory</h1>
        <p class="mb-0 opacity-75">Find talented interior designers to transform your spaces</p>
    </div>
</section>

<section class="py-4">
    <div class="container">
        <div class="row g-3" id="designers-grid">
            <div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
        <nav class="mt-4"><ul class="pagination justify-content-center" id="pagination"></ul></nav>
    </div>
</section>
{% endblock %}

{% block script %}
<script>
var currentPage = 1, totalPages = 1;
$(document).ready(function() { loadDesigners(); });

function loadDesigners() {
    $('#designers-grid').html('<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>');
    frappe.call({
        method: "construction_marketplace.api.get_architects",
        args: { page: currentPage },
        callback: function(r) {
            if(r.message) {
                var data = r.message;
                var designers = data.architects || [];
                totalPages = data.total_pages || 1;
                if(designers.length === 0) {
                    $('#designers-grid').html('<div class="col-12 text-center py-5"><i class="fas fa-paint-roller" style="font-size:3rem;color:#ddd;"></i><h5 class="mt-3 text-muted">No interior designers listed yet</h5></div>');
                    $('#pagination').empty(); return;
                }
                var html = '';
                designers.forEach(function(d) {
                    var initials = (d.customer_name || '').split(' ').map(w => w[0]).join('').slice(0,2);
                    html += '<div class="col-md-6 col-lg-4"><div class="designer-card">';
                    html += '<div class="d-flex align-items-center gap-3 mb-3">';
                    html += '<div class="designer-avatar">' + initials + '</div>';
                    html += '<div><div class="fw-bold">' + d.customer_name + '</div>';
                    if(d.company_name) html += '<div class="small text-muted">' + d.company_name + '</div>';
                    html += '</div></div>';
                    html += '<div class="small text-muted mb-2"><i class="fas fa-map-marker-alt me-1"></i>' + (d.city || '') + (d.state ? ', ' + d.state : '') + '</div>';
                    html += '<div class="portfolio-grid"><div class="portfolio-item"><i class="fas fa-image"></i></div><div class="portfolio-item"><i class="fas fa-image"></i></div><div class="portfolio-item"><i class="fas fa-image"></i></div></div>';
                    html += '<div class="mt-3"><a href="/request-quote?designer=' + encodeURIComponent(d.customer_name) + '" class="btn btn-outline-primary btn-sm rounded-pill"><i class="fas fa-envelope me-1"></i> Contact</a></div>';
                    html += '</div></div>';
                });
                $('#designers-grid').html(html);
                renderPagination();
            }
        }
    });
}

function renderPagination() {
    var html = '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '"><a class="page-link" href="#" data-page="' + (currentPage-1) + '">«</a></li>';
    for(var i = Math.max(1, currentPage-3); i <= Math.min(totalPages, currentPage+3); i++) {
        html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '"><a class="page-link" href="#" data-page="' + i + '">' + i + '</a></li>';
    }
    html += '<li class="page-item ' + (currentPage >= totalPages ? 'disabled' : '') + '"><a class="page-link" href="#" data-page="' + (currentPage+1) + '">»</a></li>';
    $('#pagination').html(html);
    $('.page-link').click(function(e) { e.preventDefault(); if($(this).parent().hasClass('disabled')) return; currentPage = parseInt($(this).data('page')); loadDesigners(); window.scrollTo({top:0,behavior:'smooth'}); });
}
</script>
{% endblock %}
